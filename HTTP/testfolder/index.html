<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Test Server Index</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Welcome to My Test Server</h1>

    <p>This page includes external CSS, external JS, and several images your server must serve correctly.</p>

    <h2>Images</h2>

    <div class="img-grid">
        <div>
            <p>PNG Image</p>
            <img src="2025-01-01_23-55.png" alt="PNG Test" width="200">
        </div>

        <div>
            <p>JPEG Image</p>
            <img src="box.jpeg" alt="JPEG Test" width="200">
        </div>

        <div>
            <p>JPG Image</p>
            <img src="wallpaper.jpg" alt="JPG Test" width="200">
        </div>
    </div>

    <h2>JavaScript Test</h2>
    <button id="testButton">Click me</button>

    <h2>POST Form Example</h2>

    <form method="POST" action="/submit">
        <label>Name:</label>
        <input type="text" name="username">

        <br><br>

        <label>Age:</label>
        <input type="number" name="age">

        <br><br>

        <button type="submit">Send</button>
    </form>
    <!-- External script -->
    <script src="script.js"></script>
</body>
</html>
